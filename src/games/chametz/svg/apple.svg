  <!-- Stem -->
  <path d="M50 28 Q49 18 52 12" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M52 18 Q58 12 64 14 Q60 18 54 20 Z" fill="#4CAF50" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Leaf vein -->
