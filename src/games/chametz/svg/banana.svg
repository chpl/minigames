<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Banana - curved shape -->
  <!-- Main banana body -->
  <path d="M25 18 Q20 28 18 42 Q14 62 24 76 Q36 92 56 88 Q72 85 82 72 Q88 62 84 55
           Q78 50 68 55 Q54 62 42 56 Q30 48 28 32 Q28 22 25 18Z"
        fill="#FFE135" stroke="#F9A825" stroke-width="3"/>
  <!-- Lighter banana highlight -->
  <path d="M27 24 Q22 34 20 46 Q18 60 26 72 Q36 86 52 84"
        fill="#FFF176" stroke="none" opacity="0.5"/>
  <!-- Peel edge at top - slightly open -->
  <path d="M25 18 Q28 12 34 10 Q30 16 28 22"
        fill="#E8C820" stroke="#D4A800" stroke-width="2" stroke-linejoin="round"/>
  <!-- Peel strip peeling back -->
  <path d="M34 10 Q38 8 40 12 Q36 16 32 18"
        fill="#FFE848" stroke="#D4A800" stroke-width="1.5"/>
  <!-- Banana brown tip at bottom -->
  <circle cx="82" cy="68" r="3" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Subtle stripe lines -->
  <path d="M24 40 Q30 36 34 40" fill="none" stroke="#E8C820" stroke-width="1" opacity="0.4"/>
  <path d="M22 55 Q28 50 34 54" fill="none" stroke="#E8C820" stroke-width="1" opacity="0.4"/>
  <path d="M26 70 Q34 66 40 68" fill="none" stroke="#E8C820" stroke-width="1" opacity="0.3"/>
  <!-- Brown spots for ripeness -->
  <circle cx="30" cy="46" r="1.5" fill="#A0845C" opacity="0.4"/>
  <circle cx="36" cy="62" r="1.5" fill="#A0845C" opacity="0.3"/>
</svg>