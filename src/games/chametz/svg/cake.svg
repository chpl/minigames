<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cake slice - triangular -->
  <!-- Back face -->
  <path d="M25 82 L50 30 L75 82 Z" fill="#F8BBD0" stroke="#C2185B" stroke-width="3" stroke-linejoin="round"/>
  <!-- Bottom layer -->
  <path d="M27 78 L73 78 L75 82 L25 82 Z" fill="#E8908A"/>
  <!-- Middle frosting layer -->
  <path d="M32 65 L68 65 L73 78 L27 78 Z" fill="#FFFFFF" stroke="none"/>
  <line x1="32" y1="65" x2="68" y2="65" stroke="#C2185B" stroke-width="1" opacity="0.3"/>
  <!-- Top layer -->
  <path d="M50 30 L32 65 L68 65 Z" fill="#FFB6C1"/>
  <!-- Pink frosting drip on top -->
  <path d="M38 48 Q44 44 50 48 Q56 44 62 48" fill="none" stroke="#FF69B4" stroke-width="3" stroke-linecap="round"/>
  <!-- Frosting on top edge -->
  <path d="M50 30 Q48 34 46 36 Q50 34 54 36 Q52 34 50 30" fill="#FF69B4"/>
  <!-- Cherry on top -->
  <circle cx="50" cy="26" r="5" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <path d="M50 21 Q52 16 56 14" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  <!-- Shine on cherry -->
  <circle cx="48" cy="24" r="1.5" fill="#FF8A80" opacity="0.7"/>
  <!-- Outline for structure -->
  <path d="M25 82 L50 30 L75 82 Z" fill="none" stroke="#C2185B" stroke-width="3" stroke-linejoin="round"/>
</svg>