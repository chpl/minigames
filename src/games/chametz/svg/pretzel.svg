  <rect x="22" y="46" width="3" height="3" rx="0.5" fill="#FFF" opacity="0.7"/>
  <rect x="74" y="46" width="3" height="3" rx="0.5" fill="#FFF" opacity="0.7"/>
  <rect x="38" y="50" width="2.5" height="2.5" rx="0.5" fill="#FFF" opacity="0.6"/>
  <rect x="58" y="50" width="2.5" height="2.5" rx="0.5" fill="#FFF" opacity="0.6"/>
</svg>