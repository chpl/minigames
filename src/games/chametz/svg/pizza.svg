  <!-- Crust arc -->
  <path d="M10 76 Q18 88 36 90" fill="none" stroke="#D4952B" stroke-width="9" stroke-linecap="round"/>
  <path d="M10 76 Q18 88 36 90" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Crust highlight -->
  <path d="M12 78 Q20 86 34 88" fill="none" stroke="#E8B838" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
