  <path d="M58 36 Q60 30 66 30 Q72 30 74 36Z" fill="#F0E0C8" stroke="#5D4037" stroke-width="1.5"/>
  <rect x="63" y="32" width="3.5" height="4" rx="1" fill="#D8C8B0" stroke="#5D4037" stroke-width="1"/>
  <!-- Cheese bubbles -->
  <circle cx="40" cy="58" r="2" fill="#F8D848" opacity="0.5"/>
  <circle cx="70" cy="30" r="1.5" fill="#F8D848" opacity="0.4"/>
