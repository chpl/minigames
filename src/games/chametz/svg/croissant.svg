<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Classic crescent croissant with visible segmented ridges -->
  <!-- Shadow -->
  <ellipse cx="50" cy="82" rx="38" ry="5" fill="#00000020"/>
  <!-- Main croissant body -->
  <path d="M6 68 Q8 48 22 38 Q34 30 50 34 Q66 30 78 38 Q92 48 94 68
           Q80 62 66 60 Q56 58 50 62 Q44 58 34 60 Q20 62 6 68Z"
        fill="#E8A020" stroke="#5D4037" stroke-width="2.5"/>
  <!-- Segment ridges - curved lines creating layered look -->
  <path d="M16 60 Q22 44 34 36 Q42 32 50 36" fill="none" stroke="#C07B18" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 36 Q58 32 66 36 Q78 44 84 60" fill="none" stroke="#C07B18" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner ridges -->
  <path d="M22 58 Q28 48 38 42 Q44 38 50 40" fill="none" stroke="#C8881A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 40 Q56 38 62 42 Q72 48 78 58" fill="none" stroke="#C8881A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M28 62 Q34 54 42 48 Q46 46 50 48" fill="none" stroke="#B87818" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M50 48 Q54 46 58 48 Q66 54 72 62" fill="none" stroke="#B87818" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Top highlight -->
  <path d="M24 50 Q32 40 44 36" fill="none" stroke="#F0C840" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Tip curls -->
  <circle cx="8" cy="66" r="4" fill="#D89018" stroke="#5D4037" stroke-width="2"/>
  <circle cx="92" cy="66" r="4" fill="#D89018" stroke="#5D4037" stroke-width="2"/>
</svg>