<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Assorted nuts cluster -->
  <!-- Walnut (back, larger) -->
  <circle cx="55" cy="40" r="16" fill="#8B6914" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="53" cy="38" r="14" fill="#A07030"/>
  <!-- Walnut brain texture -->
  <path d="M55 28 L55 52" fill="none" stroke="#6D4C41" stroke-width="1.5" opacity="0.5"/>
  <path d="M44 36 Q50 32 55 36 Q60 32 66 36" fill="none" stroke="#6D4C41" stroke-width="1" opacity="0.4"/>
  <path d="M44 44 Q50 40 55 44 Q60 40 66 44" fill="none" stroke="#6D4C41" stroke-width="1" opacity="0.4"/>
  <!-- Almond (left) -->
  <ellipse cx="30" cy="55" rx="10" ry="16" fill="#D4A040" stroke="#8B6914" stroke-width="2.5" transform="rotate(-20,30,55)"/>
  <ellipse cx="29" cy="53" rx="8" ry="13" fill="#E0B858" transform="rotate(-20,29,53)"/>
  <!-- Almond line -->
  <path d="M28 42 Q30 55 28 66" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
  <!-- Almond (right) -->
  <ellipse cx="72" cy="58" rx="10" ry="15" fill="#D4A040" stroke="#8B6914" stroke-width="2.5" transform="rotate(15,72,58)"/>
  <ellipse cx="71" cy="56" rx="8" ry="12" fill="#E0B858" transform="rotate(15,71,56)"/>
  <path d="M70 46 Q72 58 70 68" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
  <!-- Small hazelnut (front center) -->
  <circle cx="50" cy="72" r="12" fill="#6D4C41" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="48" cy="70" r="10" fill="#8B6548"/>
  <!-- Hazelnut cap -->
  <path d="M40 68 Q44 62 50 62 Q56 62 60 68" fill="#5D4037" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Highlights -->
  <circle cx="46" cy="38" r="3" fill="#C09848" opacity="0.4"/>
  <circle cx="46" cy="68" r="2" fill="#A0845C" opacity="0.4"/>
