<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Assorted nuts - almonds and walnuts with leaf -->
  <!-- Shadow -->
  <ellipse cx="50" cy="90" rx="34" ry="5" fill="#00000020"/>
  <!-- Walnut (back center, large) -->
  <circle cx="50" cy="42" r="18" fill="#8B6914" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="48" cy="40" r="15" fill="#A07830"/>
  <!-- Walnut seam and texture -->
  <path d="M50 26 L50 58" fill="none" stroke="#6D4C41" stroke-width="1.5" opacity="0.5"/>
  <path d="M38 36 Q44 32 50 36 Q56 32 62 36" fill="none" stroke="#6D4C41" stroke-width="1" opacity="0.4"/>
  <path d="M38 46 Q44 42 50 46 Q56 42 62 46" fill="none" stroke="#6D4C41" stroke-width="1" opacity="0.4"/>
  <!-- Walnut highlight -->
  <circle cx="44" cy="36" r="4" fill="#B89040" opacity="0.35"/>
  <!-- Almond (left) -->
  <ellipse cx="24" cy="64" rx="10" ry="16" fill="#D4A040" stroke="#5D4037" stroke-width="2.5" transform="rotate(-15,24,64)"/>
  <ellipse cx="23" cy="62" rx="8" ry="13" fill="#E0B858" transform="rotate(-15,23,62)"/>
  <path d="M22 50 Q24 62 22 76" fill="none" stroke="#B88818" stroke-width="1" opacity="0.4"/>
  <!-- Almond (right) -->
  <ellipse cx="76" cy="64" rx="10" ry="16" fill="#D4A040" stroke="#5D4037" stroke-width="2.5" transform="rotate(15,76,64)"/>
  <ellipse cx="75" cy="62" rx="8" ry="13" fill="#E0B858" transform="rotate(15,75,62)"/>
  <path d="M74 50 Q76 62 74 76" fill="none" stroke="#B88818" stroke-width="1" opacity="0.4"/>
  <!-- Small round nut (front center) -->
  <circle cx="50" cy="74" r="12" fill="#6D4C41" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="48" cy="72" r="10" fill="#8B6548"/>
  <circle cx="46" cy="70" r="3" fill="#A0845C" opacity="0.35"/>
  <!-- Green leaf accent -->
  <path d="M62 28 Q70 20 78 22 Q74 28 66 32Z" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M66 30 Q72 24 76 22" fill="none" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>
</svg>