  <path d="M24 54 Q20 50 22 46 Q26 48 28 52" fill="#C8881A" stroke="#5D4037" stroke-width="1.5"/>
  <path d="M76 54 Q80 50 78 46 Q74 48 72 52" fill="#C8881A" stroke="#5D4037" stroke-width="1.5"/>
