  <!-- Bake spots/bubbles -->
  <circle cx="34" cy="39" r="2.5" fill="#D4B896" opacity="0.6"/>
  <circle cx="58" cy="49" r="3" fill="#D4B896" opacity="0.5"/>
  <circle cx="46" cy="59" r="2" fill="#D4B896" opacity="0.6"/>
  <circle cx="70" cy="39" r="2" fill="#D4B896" opacity="0.5"/>
  <circle cx="22" cy="49" r="2.5" fill="#D4B896" opacity="0.5"/>
  <circle cx="34" cy="69" r="2" fill="#D4B896" opacity="0.6"/>
  <circle cx="70" cy="59" r="2.5" fill="#D4B896" opacity="0.5"/>
  <!-- Slight edge browning -->
