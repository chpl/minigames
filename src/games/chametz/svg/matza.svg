  <line x1="76" y1="26" x2="76" y2="74" stroke="#D2B48C" stroke-width="1.5" stroke-dasharray="3,4"/>
  <!-- Perforation grid - horizontal lines -->
  <line x1="18" y1="34" x2="82" y2="34" stroke="#D2B48C" stroke-width="1.5" stroke-dasharray="3,4"/>
  <line x1="18" y1="44" x2="82" y2="44" stroke="#D2B48C" stroke-width="1.5" stroke-dasharray="3,4"/>
